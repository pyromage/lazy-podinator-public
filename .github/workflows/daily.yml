name: Daily Podcast

# Generates the daily episodes on a free public-repo runner (4 vCPU, no minute
# cap) and publishes to GCS. Replaces the Cloud Run service for the scheduled run.
on:
  schedule:
    # 11:00 UTC = 07:00 EDT (summer) / 06:00 EST (winter). Fixed-UTC cron does
    # not shift for DST, so this starts 6–7am ET year-round — a 2h+ buffer
    # before the 9am ET target, even if the auto-retry adds a second run.
    - cron: "0 11 * * *"
  workflow_dispatch: {}     # allow manual runs from the Actions tab

jobs:
  generate:
    # Only run on the public repo (free unlimited minutes). The mirror in the
    # private repo skips this job. Forkers: change to "<owner>/<repo>".
    if: github.repository == 'pyromage/lazy-podinator-public'
    runs-on: ubuntu-latest   # standard runner: free on public repos
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write        # required for Workload Identity Federation (keyless GCP auth)
      issues: write          # required to open a failure-alert issue (see final step)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng libsndfile1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Kokoro TTS model
        run: |
          mkdir -p kokoro
          curl -sL https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.int8.onnx -o kokoro/kokoro-v1.0.int8.onnx
          curl -sL https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin -o kokoro/voices-v1.0.bin

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CLAUDE_MODEL: claude-sonnet-4-6
          TTS_ENGINE: kokoro
          KOKORO_MODEL_PATH: kokoro/kokoro-v1.0.int8.onnx
          KOKORO_VOICES_PATH: kokoro/voices-v1.0.bin
        run: python main.py run

      # Self-contained failure alert (no external secret / no Gmail token).
      # Only fires once the auto-retry has also failed (run_attempt >= 2), so a
      # transient first-attempt failure that the retry fixes stays quiet.
      - name: Alert on repeated failure
        if: failure() && github.run_attempt >= 2
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Daily Podcast pipeline failed ($(date -u +%Y-%m-%d))" \
            --assignee "${{ github.repository_owner }}" \
            --body "The daily podcast pipeline failed on attempt ${{ github.run_attempt }} (after auto-retry).

          Run: $RUN_URL

          Check the \"Run pipeline\" step logs for the per-show ✓/✗ summary.
          Common cause: depleted Anthropic API credits (fast ~1min failure) —
          check console.anthropic.com/settings/billing." \
            || echo "WARNING: could not open failure-alert issue"
