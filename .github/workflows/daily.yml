name: Daily Podcast

# Generates the daily episodes on a free public-repo runner (4 vCPU, no minute
# cap) and publishes to GCS. Replaces the Cloud Run service for the scheduled run.
on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 08:00 EST
  workflow_dispatch: {}     # allow manual runs from the Actions tab

jobs:
  generate:
    # Only run on the public repo (free unlimited minutes). The mirror in the
    # private repo skips this job. Forkers: change to "<owner>/<repo>".
    if: github.repository == 'pyromage/lazy-podinator-public'
    runs-on: ubuntu-latest   # standard runner: free on public repos
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write        # required for Workload Identity Federation (keyless GCP auth)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng libsndfile1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Kokoro TTS model
        run: |
          mkdir -p kokoro
          curl -sL https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.int8.onnx -o kokoro/kokoro-v1.0.int8.onnx
          curl -sL https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin -o kokoro/voices-v1.0.bin

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CLAUDE_MODEL: claude-sonnet-4-6
          TTS_ENGINE: kokoro
          KOKORO_MODEL_PATH: kokoro/kokoro-v1.0.int8.onnx
          KOKORO_VOICES_PATH: kokoro/voices-v1.0.bin
        run: python main.py run
