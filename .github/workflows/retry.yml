name: Retry Daily Podcast

# Auto-reruns the Daily Podcast workflow once if it fails (e.g. the hosted
# runner dies mid-run). The rerun starts on a fresh runner, and because show
# generation is idempotent it only regenerates the show(s) still missing.
on:
  workflow_run:
    workflows: ["Daily Podcast"]
    types: [completed]

jobs:
  rerun:
    # Only on failure, and only once (run_attempt < 2 stops a retry loop).
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 2
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
